<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour l'amour de ma vie</title>
    <link type="text/css" rel="stylesheet" href="./Love_files/default.css">
    <script type="text/javascript" src="./Love_files/jquery.min.js"></script>
    <script type="text/javascript" src="./Love_files/jscex.min.js"></script>
    <script type="text/javascript" src="./Love_files/jscex-parser.js"></script>
    <script type="text/javascript" src="./Love_files/jscex-jit.js"></script>
    <script type="text/javascript" src="./Love_files/jscex-builder-base.min.js"></script>
    <script type="text/javascript" src="./Love_files/jscex-async.min.js"></script>
    <script type="text/javascript" src="./Love_files/jscex-async-powerpack.min.js"></script>

    <script type="text/javascript" src="./Love_files/love.js" charset="utf-8"></script>

<body>
    <div id="main">
        <div id="error">Votre navigateur n'est pas compatible. Veuillez utiliser <a href="http://www.google.cn/chrome/">Chrome</a> ou <a href="http://firefox.com.cn/download/">Firefox</a>.</div>
        
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">Pour l'amour de ma vie :</span><br>
                    <span class="say"> </span><br>
                    <span class="say">Si je devais choisir un endroit sûr,</span><br>
                    <span class="say">ce serait à tes côtés.</span><br>
                    <span class="say"> </span><br>
                    <span class="say">Plus je passe de temps avec toi,</span><br>
                    <span class="say">plus je t'aime chaque jour.</span><br>
                    <span class="say"> </span><br>
                    <span class="say"><span class="space"></span> — Je t'aime !</span>
                </div>
            </div>
            <div id="clock-box">
                Mon amour pour toi a commencé il y a...
                <div id="clock"></div>
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
